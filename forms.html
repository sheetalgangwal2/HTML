<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form >

        <label for="name">Enter your Name:</label>
        <input type="text" name="UserName" id="name">

        <br><br>

        <label for="fname">Enter your Father's Name:</label>
        <input type="text" name="UserFName" id="fname">

        <br><br>

        <label for="age">Enter your Age:</label>
        <input type="number" name="UserAge" id="age">

        <br><br>

        <label for="pword">Enter Password:</label>
        <input type="password" name="UserPassword" id="pword">

        <br><br>


        <label>Select your Gender :<label>
        <label for="male">Male</label>
        <input type="radio" name="UserGender" id="male" value="male">

        <label for="female">Female</label>
        <input type="radio" name="UserGender" id="female" value="female">

        <label for="other">Other</label>
        <input type="radio" name="UserGender" id="other" value="other">

        <br><br>
        
        <label>Select Language:</label>
        <br>
        <label for="Java">Java</label>
        <input type="checkbox" id="Java" name="Java">

        <label for="C++">C++</label>
        <input type="checkbox" id="C++" name="C++">

        <label for="Python">Python</label>
        <input type="checkbox" id="Python" name="Python">

        <label for="HTML">HTML</label>
        <input type="checkbox" id="HTML" name="HTML">

        <label for="JavaScript">JavaScript</label>
        <input type="checkbox" id="JavaScript" name="JavaScript">

        <br><br>

        <input type="submit">

    </form>

</body>
</html>
